<button
  mat-flat-button
  [ngClass]="styles()"
  [color]="color()"
  [type]="btnType()"
  [disabled]="disabled() || isLoading()"
  (click)="handleClick()"
>
  <span class="btn-content">
    @if (isLoading()) {
      <mat-spinner [color]="spinnerColor()" [diameter]="20" />
      <span>{{ btnLoadingKey() | translate }}</span>
    } @else {
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
      <span>{{ btnKey() | translate }}</span>
    }
  </span>
</button>

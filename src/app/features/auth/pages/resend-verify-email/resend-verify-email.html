<div class="resend-verify-email">
  <mat-card class="resend-verify-email-card">
    <mat-card-header>
      <mat-card-title>{{ 'auth.resendVerifyEmail.title' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form
        class="resend-verify-email-form"
        [formGroup]="formState.form"
        (ngSubmit)="handleSubmit()"
      >
        <vrm-form-input
          formControlName="email"
          fieldName="email"
          labelKey="auth.resendVerifyEmail.email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="resend-verify-email-links">
          <a [routerLink]="[siteUrls.auth.login]">
            {{ 'auth.resendVerifyEmail.alreadyHaveAccount' | translate }}
          </a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width mt-4"
          btnKey="auth.resendVerifyEmail.submit"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

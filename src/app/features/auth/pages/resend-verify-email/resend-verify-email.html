<div class="resend-verify-email">
  <mat-card class="resend-verify-email-card">
    <mat-card-header>
      <mat-card-title>Resend Verification Email</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form
        class="resend-verify-email-form"
        [formGroup]="formState.form"
        (ngSubmit)="handleSubmit()"
      >
        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="resend-verify-email-links">
          <a [routerLink]="[siteUrls.auth.login]">Already have an account? Log in</a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width mt-4"
          btnText="Resend Verification Email"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

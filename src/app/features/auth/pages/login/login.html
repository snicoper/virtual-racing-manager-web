<div class="login">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Virtual Racing Manager</mat-card-title>
      <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          label="Password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-non-field-errors [formState]="formState" />

        <button mat-flat-button type="submit">Sign in</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="login">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>{{ 'auth.login.title' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-non-field-errors class="mb-2" [formState]="formState" />

        @if (isEmailNotVerifiedError()) {
          <p class="mb-2">
            {{ 'auth.login.needVerificationEmail' | translate }}
            <a [routerLink]="siteUrls.auth.resendVerifyEmail">
              {{ 'auth.login.resendVerificationEmail' | translate }}
            </a>
          </p>
        }

        <vrm-form-input
          formControlName="email"
          fieldName="email"
          labelKey="auth.login.email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          labelKey="auth.login.password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a [routerLink]="siteUrls.auth.forgotPassword">
            {{ 'auth.login.forgotPassword' | translate }}
          </a>

          <span class="spacer"></span>

          <a [routerLink]="siteUrls.auth.register">
            {{ 'auth.login.createAccount' | translate }}
          </a>
        </div>

        <vrm-btn-loading
          styles="full-width"
          btnKey="auth.login.submit"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

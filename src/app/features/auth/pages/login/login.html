<div class="login">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>{{ siteName }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-non-field-errors class="mb-2" [formState]="formState" />

        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          label="Password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a routerLink="/forgot-password">Forgot password?</a>

          <span class="spacer"></span>

          <a routerLink="/register">Create account</a>
        </div>

        <button mat-flat-button type="submit">Sign in</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

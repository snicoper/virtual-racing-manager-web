<div class="login">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-non-field-errors class="mb-2" [formState]="formState" />

        @if (isEmailNotVerifiedError()) {
          <p class="mb-2">
            Need a new verification email?
            <a [routerLink]="siteUrls.auth.resendVerifyEmail">Resend verification email</a>
          </p>
        }

        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          label="Password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a [routerLink]="siteUrls.auth.forgotPassword">Forgot password?</a>

          <span class="spacer"></span>

          <a [routerLink]="siteUrls.auth.register">Create account</a>
        </div>

        <vrm-btn-loading
          styles="full-width"
          btnText="Sign in"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

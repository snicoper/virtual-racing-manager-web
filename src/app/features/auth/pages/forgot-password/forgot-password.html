<div class="forgot-password">
  <mat-card class="forgot-password-card">
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="forgot-password-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="forgot-password-links">
          <a [routerLink]="siteUrls.auth.login">Already have an account? Log in</a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width"
          btnText="Send Password Reset Instructions"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

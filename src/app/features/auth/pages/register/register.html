<div class="register">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>{{ siteName }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form class="register-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-non-field-errors class="mb-2" [formState]="formState" />

        <vrm-form-input
          formControlName="email"
          fieldName="email"
          label="Email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          label="Password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="confirmPassword"
          fieldName="confirmPassword"
          label="Confirm password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-btn-loading
          styles="full-width mt-4"
          btnText="Create account"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="register">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>{{ 'auth.register.title' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="register-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-non-field-errors class="mb-2" [formState]="formState" />

        <vrm-form-input
          formControlName="email"
          fieldName="email"
          labelKey="auth.register.email"
          icon="mail"
          [formState]="formState"
          [formInputType]="formInputTypes.Email"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="password"
          fieldName="password"
          labelKey="auth.register.password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="confirmPassword"
          fieldName="confirmPassword"
          labelKey="auth.register.confirmPassword"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a [routerLink]="[siteUrls.auth.login]">
            {{ 'auth.register.alreadyHaveAccount' | translate }}
          </a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width mt-4"
          btnKey="auth.register.submit"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

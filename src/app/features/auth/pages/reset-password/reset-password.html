<div class="password-reset">
  <mat-card class="password-reset-card">
    <mat-card-header>
      <mat-card-title>Reset Password</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="password-reset-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-form-input
          formControlName="password"
          fieldName="password"
          label="Password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="confirmPassword"
          fieldName="confirmPassword"
          label="Confirm password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a [routerLink]="siteUrls.auth.login">Already have an account? Log in</a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width"
          btnText="Reset Password"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

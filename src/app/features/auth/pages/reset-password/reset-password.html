<div class="password-reset">
  <mat-card class="password-reset-card">
    <mat-card-header>
      <mat-card-title>{{ 'auth.resetPassword.title' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="password-reset-form" [formGroup]="formState.form" (ngSubmit)="handleSubmit()">
        <vrm-form-input
          formControlName="password"
          fieldName="password"
          labelKey="auth.resetPassword.password"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <vrm-form-input
          formControlName="confirmPassword"
          fieldName="confirmPassword"
          labelKey="auth.resetPassword.confirmPassword"
          icon="lock"
          [formState]="formState"
          [formInputType]="formInputTypes.Password"
          [formIconPosition]="iconPositions.suffix"
        />

        <div class="login-links">
          <a [routerLink]="siteUrls.auth.login">
            {{ 'auth.resetPassword.alreadyHaveAccount' | translate }}
          </a>

          <span class="spacer"></span>
        </div>

        <vrm-btn-loading
          styles="full-width"
          btnKey="auth.resetPassword.submit"
          [isLoading]="formState.isLoading()"
        />
      </form>
    </mat-card-content>
  </mat-card>
</div>

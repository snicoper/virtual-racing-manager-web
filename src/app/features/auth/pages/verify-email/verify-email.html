<div class="verify-token">
  <mat-card class="verify-token-card">
    <mat-card-header>
      <mat-card-title>Verify Email</mat-card-title>
      <mat-card-subtitle>{{ siteName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (loading()) {
        <p>Your email is being verified...</p>
      } @else {
        @if (isTokenValid()) {
          <p>
            Your email has been successfully verified. You can now
            <a [routerLink]="[siteUrls.auth.login]">login</a>.
          </p>
        } @else {
          <p>The verification token is invalid or has expired.</p>
          <a [routerLink]="[siteUrls.auth.resendVerifyEmail]">Resend Verification Email</a>
        }
      }
    </mat-card-content>
  </mat-card>
</div>
